
{%extends 'main.html'%}
{%load static%}
!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {%block title%} Ваш профиль {%endblock%}
    {%block link%} 
    <link rel="stylesheet" href="{%static 'css/profile.css'%}">
    {%endblock%}
</head>
<body>
    {%block content%}
     <div class="main-container">
          <div class="user-bar">
            <a href="{%url 'profile'%}"><div class="Main-inf"><button>Лицевой счет</button></div></a>
            <a href="{%url 'services'%}"><div class="services"><button>Услуги</button></div></a>
           <a href="{%url 'settings'%}"> <div class="changing-profile"><button>Изменение профиля</button></div></a>
            
        </div>
            <div class="container-other">

    <div class="user-profile-inf">

        <div class="form-group">
            <label>ФИО:</label>
            <input type="text" value="{{ user.user_last_name }}">
        </div>

        <div class="form-group">
            <label>Номер телефона:</label>
            <input type="text" value="{{ user.numberphone }}">
        </div>

        <div class="form-group">
            <label>Адрес подключения:</label>
            <input type="text" value="{{ user.address }}">
        </div>

        <div class="form-group">
            <label>Новый пароль:</label>
            <input type="password" placeholder="Введите новый пароль">
        </div>

        <button class="save-btn">Сохранить изменения</button>

    </div>

</div>
        </div>
     </div>
    
    {%endblock%}    
</body>
</html>
