
{%extends 'main.html'%}
{%load static%}
!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {%block title%} Ваш профиль {%endblock%}
    {%block link%} 
    <link rel="stylesheet" href="{%static 'css/profile.css'%}">
    {%endblock%}
</head>
<body>
    {%block content%}
     <div class="main-container">
        <div class="user-bar">
            <a href="{%url 'profile'%}"><div class="Main-inf"><button>Лицевой счет</button></div></a>
            <a href="{%url 'services'%}"><div class="services"><button>Услуги</button></div></a>
           <a href="{%url 'settings'%}"> <div class="changing-profile"><button>Изменение профиля</button></div></a>
            
        </div>
        <div class="container-other">
            <div class="container-other">
    <div class="support-left">
        <h2>Заявка в техническую поддержку</h2>

        <form id="support-form">
            <div class="form-group">
                <label>ФИО:</label>
                <input type="text" name="name" placeholder="Введите ваше ФИО">
            </div>

            <div class="form-group">
                <label>Номер телефона:</label>
                <input type="text" name="phone" placeholder="Введите номер телефона">
            </div>

            <div class="form-group">
                <label>Описание проблемы:</label>
                <textarea name="problem" placeholder="Опишите проблему"></textarea>
            </div>

            <button type="submit" class="submit-btn">Отправить заявку</button>
        </form>
    </div>

    <div class="support-right">
        <!-- Правая зона для информации или списка заявок -->
    </div>
</div>
        </div>
     </div>
    
    {%endblock%}    
</body>
</html>
